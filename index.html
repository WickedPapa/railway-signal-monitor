<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Preset Manager</title>
    <!-- Use local downloaded scripts -->
    <script src="libs/papaparse.min.js"></script>
    <script src="libs/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="glass-panel main-header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <h1>CSV Manager</h1>
        </div>
        
        <div class="header-controls">
            <div class="file-loader">
                <label for="csvFileInput" class="btn primary-btn" id="uploadBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Carica CSV</span>
                </label>
                <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
                <span id="fileNameDisplay" class="file-name">Nessun file selezionato</span>
            </div>

            <div class="preset-controls disabled-when-empty" id="presetControlsGroup">
                <div class="select-wrapper">
                    <select id="presetSelect" class="preset-dropdown">
                        <option value="base">Base (Tutte le colonne)</option>
                        <!-- Dynamic options here -->
                    </select>
                </div>
                
                <div class="btn-group">
                    <button id="btnClonePreset" class="btn icon-btn" title="Clona Preset / Nuovo da...">
                        Colonna +
                    </button>
                    <button id="btnEditPreset" class="btn icon-btn" title="Modifica Preset Corrente">
                        ✎
                    </button>
                    <button id="btnDeletePreset" class="btn icon-btn danger-hover" title="Elimina Preset">
                        🗑
                    </button>
                    <div class="separator"></div>
                    <button id="btnExportPresets" class="btn icon-btn" title="Esporta Preset">
                        ⭳ Export
                    </button>
                    <label for="importPresetInput" class="btn icon-btn" title="Importa Preset" style="cursor: pointer; margin:0;">
                         ⭱ Import
                    </label>
                    <input type="file" id="importPresetInput" accept=".json" style="display: none;">
                </div>
            </div>
        </div>
    </header>

    <main class="grid-container">
        <!-- Empty state before load -->
        <div id="emptyState" class="empty-state">
            <div class="empty-icon">📁</div>
            <h2>Nessun dato caricato</h2>
            <p>Carica un file CSV per visualizzare i dati e gestire i preset.</p>
        </div>
        <!-- AG Grid Container -->
        <div id="myGrid" class="ag-theme-alpine-dark" style="height: 100%; width: 100%; display: none;"></div>
    </main>

    <!-- Modal for cloning/editing preset -->
    <div id="presetModal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 id="modalTitle">Crea Nuovo Preset</h2>
                <button id="btnCloseModal" class="btn-close">×</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group">
                    <label for="presetNameInput">Nome Preset</label>
                    <input type="text" id="presetNameInput" placeholder="Es. Vista Dettagliata" class="input-light" autocomplete="off">
                </div>

                <div class="columns-selector">
                    <div class="search-box">
                        <input type="text" id="columnSearchInput" placeholder="Cerca tra le colonne..." class="input-light">
                        <span class="search-icon">🔍</span>
                    </div>
                    
                    <div class="selectAll-container">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="selectAllCheckbox">
                            <span class="checkmark"></span>
                            Seleziona/Deseleziona Tutto (<span id="visibleColumnsCount">0</span>)
                        </label>
                    </div>

                    <div id="columnListContainer" class="columns-list">
                        <!-- Checkboxes will be dynamically rendered here -->
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btnCancelModal" class="btn secondary-btn">Annulla</button>
                <button id="btnSavePreset" class="btn primary-btn">Salva Preset</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="modal-overlay" style="display: none;">
        <div class="loader-content glass-panel" style="width: auto;">
            <div class="spinner"></div>
            <h3 id="loadingText">Caricamento in corso...</h3>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
